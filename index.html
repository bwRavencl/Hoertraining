<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hörtraining</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon" href="favicon.ico" />
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --accent: #38bdf8;
        --text: #e2e8f0;
      }

      body {
        margin: 0;
        font-family: system-ui, Arial;
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      h1 {
        margin-top: 0;
        text-align: center;
      }

      label {
        display: grid;
        justify-items: center;
        gap: 10px;
        text-align: center;
        font-weight: bold;
      }

      button {
        font-size: 1.25rem;
        padding: 16px;
        max-height: 5.5rem;
        min-height: 5.5rem;
        min-width: 9rem;
        width: 75%;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: black;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      select {
        padding: 6px;
        margin-top: 6px;
        border-radius: 6px;
        width: 6rem;
        border: none;
        text-align: center;
      }

      #app {
        width: 100%;
        max-width: 700px;
        background: var(--card);
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      #feedback {
        text-align: center;
        font-size: 1.25rem;
        font-weight: bold;
      }

      #liveStats {
        text-align: center;
        line-height: 1.75;
        margin: 16px 0 32px 0;
        font-size: 0.9rem;
        opacity: 0.9;
      }

      #startBtn {
        width: unset;
        width: 33%;
      }

      .center {
        text-align: center;
      }

      .hidden {
        display: none;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        justify-items: center;
        align-items: end;
        gap: 12px;
        margin: 50px 0 50px 0;
      }

      .startOverBtn {
        background: #da9370;
        min-height: unset;
        width: 33%;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <h1>Hörtraining</h1>
      <div id="setup">
        <div class="controls">
          <label>
            Start-Schwierigkeit<br />
            <select id="difficulty">
              <option value="12">sehr leicht</option>
              <option value="8">leicht</option>
              <option value="5" selected>mittel</option>
              <option value="3">schwer</option>
            </select>
          </label>
          <label>
            Wellenform<br />
            <select id="waveform">
              <option value="sine">Sinus</option>
              <option value="triangle">Dreieck</option>
              <option value="square">Rechteck</option>
              <option value="sawtooth">Sägezahn</option>
            </select>
          </label>
        </div>
        <div class="center">
          <button id="startBtn" onclick="startGame()">Training starten</button>
        </div>
      </div>
      <div id="game" class="center hidden">
        <div class="center" id="roundLabel"></div>
        <div class="controls">
          <button id="playBtn" onclick="playPair()">Abspielen</button>
          <button id="nextBtn" onclick="nextPair()" disabled>Weiter</button>
        </div>
        <div class="controls">
          <button id="tone1Btn" onclick="answer(true)" disabled>1. Ton höher</button>
          <button id="tone2Btn" onclick="answer(false)" disabled>2. Ton höher</button>
        </div>
        <div id="feedback"></div>
        <div id="liveStats"></div>
        <button class="startOverBtn" onclick="startOver()">Neue Runde</button>
      </div>
      <div id="result" class="hidden center">
        <h2>Ergebnis</h2>
        <div id="finalScore"></div>
        <div id="sessionStats"></div>
        <br />
        <button class="startOverBtn" onclick="startOver()">Neue Runde</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
